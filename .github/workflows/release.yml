name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-pack:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci --ignore-scripts
      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run --silent sbom > sbom.cdx.json
      - name: Pack and checksum release artifacts
        run: |
          npm pack --ignore-scripts --silent
          sha256sum ./*.tgz sbom.cdx.json > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            *.tgz
            sbom.cdx.json
            SHA256SUMS

  publish:
    needs: verify-pack
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-artifacts
      - run: npm publish ./*.tgz --access public --provenance

  github-release:
    needs: publish
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-artifacts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz sbom.cdx.json SHA256SUMS --generate-notes
