name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-pack:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci --ignore-scripts
      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run --silent sbom > sbom.cdx.json
      - name: Pack and checksum release artifacts
        run: |
          npm pack --ignore-scripts --silent
          sha256sum ./*.tgz sbom.cdx.json > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            *.tgz
            sbom.cdx.json
            SHA256SUMS

  publish:
    needs: verify-pack
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
      - run: npm publish ./*.tgz --access public --provenance

  github-release:
    needs: publish
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz sbom.cdx.json SHA256SUMS --generate-notes
